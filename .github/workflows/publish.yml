name: Publish

# Publishes the folio packages to npm with SLSA provenance via OIDC trusted
# publishing (no long-lived NPM_TOKEN). The monorepo ships four packages:
# @stll/folio-core (headless engine), @stll/folio-react (React editor),
# @stll/folio-vue (Vue editor), and @stll/folio-nuxt (Nuxt module wrapping the
# Vue editor). All are released by this workflow as a matrix.
#
# Least privilege: packing and publishing are separate jobs. The `pack` job runs
# the untrusted build (bun install, build, prepare-publish, bun pm pack) with NO
# id-token, so a compromised build/postinstall script cannot mint an OIDC
# credential. Only the `publish` job — which downloads the prebuilt tarballs and
# runs the hardened action — is granted id-token: write.
#
# Dependency order: @stll/folio-core publishes before @stll/folio-react and
# @stll/folio-vue (both pin `@stll/folio-core` via `workspace:^`, which bun pm
# pack rewrites to the concrete version), and @stll/folio-vue before
# @stll/folio-nuxt (nuxt pins `@stll/folio-vue`). The publish job runs the matrix
# with `max-parallel: 1` in core → react → vue → nuxt order.
#
# @stll/folio-vue and @stll/folio-nuxt ship dist-shaped `exports` in-repo, so the
# pack job skips the prepare-publish source->dist transform for them (it only
# understands core/react's `./src/*.ts` string exports); bun pm pack still
# rewrites their `workspace:` deps to concrete versions.
#
# Prerequisite (one-time, by a maintainer on npmjs.com): configure an npm
# "trusted publisher" for EACH package pointing at this repository and this
# workflow file. The hardened action refuses to fall back to token auth, so the
# first publish of a package fails until its trusted publisher exists. NOTE:
# @stll/folio-vue and @stll/folio-nuxt still need their trusted-publisher / OIDC
# entries created on npm before their publish jobs can succeed — a manual npm-side
# step, done once per package.
#
# Auto-release: a version bump to either package.json merged to main publishes
# that version. The hardened action is idempotent: it skips a name@version
# already on the registry, so bumping only one package republishes only it.
# Manual dispatch with `publish` unchecked builds + packs only (a dry run).
#
# Each successful publish also cuts a GitHub Release (tag `<name>@<version>`)
# with the exact tarball that went to npm attached as an asset. That tarball is
# the content-addressed link between the public GitHub reference and the npm
# artifact: downstream users can verify byte-for-byte that what they install
# matches this release. Release creation is idempotent — it skips if the tag
# already exists, mirroring the hardened action's version-level idempotency.

env:
  NODE_VERSION: "22"
  NPM_VERSION: "11.11.1"

on:
  push:
    branches: [main]
    paths:
      - packages/core/package.json
      - packages/react/package.json
      - packages/vue/package.json
      - packages/nuxt/package.json
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm (leave unchecked for a build + pack dry run)
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pack:
    name: Build and pack ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [core, react, vue, nuxt]
    permissions:
      contents: read # deliberately NO id-token: untrusted build scripts run here
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - run: bun install --frozen-lockfile

      - name: Build and pack
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
        run: |
          set -euo pipefail
          # Build the package, then transform its package.json from the in-repo
          # source shape (exports -> ./src/*.ts) to the published dist shape
          # (exports -> ./dist, real .d.ts, no src). No restore needed: ephemeral
          # checkout.
          #
          # Pack with `bun pm pack`, NOT `npm pack`: only Bun rewrites the
          # `workspace:` / `catalog:` dependency protocols to concrete versions
          # in the published package.json (react's `@stll/folio-core` dep).
          bun --filter "@stll/folio-${PKG}" build
          # core/react carry source-shaped exports (./src/*.ts) that
          # prepare-publish rewrites to dist; vue/nuxt already ship dist-shaped
          # exports, so skip the transform (it panics on their { types, import }
          # objects). bun pm pack still rewrites their workspace: deps below.
          case "${PKG}" in
            core|react) bun scripts/prepare-publish.ts "packages/${PKG}" ;;
            *) echo "skip prepare-publish for ${PKG} (already dist-shaped)" ;;
          esac
          mkdir -p "${GITHUB_WORKSPACE}/release-artifacts"
          ( cd "packages/${PKG}" && bun pm pack --destination "${GITHUB_WORKSPACE}/release-artifacts" )
          sha256sum release-artifacts/*.tgz >> "release-artifacts/SHA256SUMS-${PKG}"

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-${{ matrix.pkg }}
          path: release-artifacts/
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Publish @stll/folio-${{ matrix.pkg }}
    needs: pack
    # Auto-publish only from main: a version-bump push to main, or a manual
    # dispatch from main with the publish checkbox ticked. A dispatch from any
    # other branch is a dry run (pack only), never a publish.
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    strategy:
      # Ordered so every package's published deps already exist on the registry
      # for downstream installs: core before react/vue (both dep on core), and
      # vue before nuxt (nuxt deps on vue).
      max-parallel: 1
      matrix:
        pkg: [core, react, vue, nuxt]
    permissions:
      # contents: write cuts the per-version GitHub Release below. Safe to grant
      # alongside id-token here: this job runs no untrusted build scripts (they
      # ran in the pack job); it only downloads a prebuilt tarball, publishes it,
      # and creates the release.
      contents: write
      id-token: write # OIDC only here; build scripts already ran in the pack job
      attestations: write # build provenance attestation for the published tarball
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install npm for trusted publishing
        # --ignore-scripts: this job holds id-token: write, so do not run any
        # lifecycle hooks from the fetched npm package before the hardened
        # publish step (npm itself needs none to run).
        run: npm install --global --ignore-scripts "npm@${{ env.NPM_VERSION }}"

      - name: Download tarball
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: npm-tarball-${{ matrix.pkg }}
          path: release-artifacts/

      - name: Resolve tarball metadata
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          tgz="$(ls release-artifacts/*.tgz)"
          # Read name and version from the tarball's bundled package.json — the
          # published artifact is whatever bytes are in the .tgz, so the release
          # tag must reflect that (and `bun pm pack` has already rewritten any
          # `workspace:`/`catalog:` deps to concrete versions inside it).
          tar -xOf "${tgz}" package/package.json > "${RUNNER_TEMP}/pkg.json"
          name="$(node -p "require('${RUNNER_TEMP}/pkg.json').name")"
          version="$(node -p "require('${RUNNER_TEMP}/pkg.json').version")"
          {
            echo "path=${tgz}"
            echo "name=${name}"
            echo "version=${version}"
            echo "tag=${name}@${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish to npm
        uses: stella/.github/.github/actions/npm-publish-hardened@96b8912e0786548c4e62046ce3965769991dd0e0
        with:
          # Real releases ship as `latest`, promoting past the one-time
          # `placeholder`-tagged bootstrap stubs. `latest` is the action default,
          # set here explicitly so the intent is visible at the call site.
          tarball: ${{ steps.tarball.outputs.path }}
          tag: latest

      - name: Create GitHub Release
        # Attach the exact tarball published to npm so the GitHub Release is the
        # content-addressed public reference for the artifact. Idempotent: on a
        # re-run (or when the sibling package was not bumped and npm publish was
        # skipped), the tag already exists and we skip.
        env:
          GH_TOKEN: ${{ github.token }}
          # The job downloads only the tarball artifact (no checkout), so gh
          # cannot infer the repository from a git remote; pass it explicitly.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tarball.outputs.tag }}
          NAME: ${{ steps.tarball.outputs.name }}
          VERSION: ${{ steps.tarball.outputs.version }}
          TARBALL: ${{ steps.tarball.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists; skipping."
            exit 0
          fi
          gh release create "${TAG}" "${TARBALL}" \
            --target "${GITHUB_SHA}" \
            --title "${NAME}@${VERSION}" \
            --notes "\`${NAME}@${VERSION}\` published to npm via OIDC trusted publishing with SLSA provenance. The attached tarball is the exact artifact published to the registry."
