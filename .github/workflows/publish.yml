name: Publish

# Keep this filename stable: npm trusted publishing authorizes the local calling
# workflow, even though the privileged release transaction runs in a reusable
# workflow. Build and pack remain here, without an OIDC credential; the central
# workflow validates and publishes the resulting tarballs.

on:
  push:
    branches: [main]
    paths:
      - packages/docx-core/package.json
      - packages/core/package.json
      - packages/react/package.json
      - packages/agents/package.json
      - packages/vue/package.json
      - packages/nuxt/package.json
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm (leave unchecked for a build + pack dry run)
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  pack:
    name: Build and pack ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [docx-core, core, react, agents, vue, nuxt]
    permissions:
      contents: read # Deliberately no id-token while dependency and build scripts run.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - run: bun install --frozen-lockfile

      - name: Build and pack
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
        run: |
          set -euo pipefail
          case "${PKG}" in
            docx-core) package_name="@stll/docx-core" ;;
            *) package_name="@stll/folio-${PKG}" ;;
          esac
          bun --filter "${package_name}" build

          # These packages keep source-shaped exports in the repository; convert
          # those manifests to their published dist shape before packing. Vue and
          # Nuxt already use dist-shaped export objects.
          case "${PKG}" in
            docx-core|core|react|agents) bun scripts/prepare-publish.ts "packages/${PKG}" ;;
            *) echo "skip prepare-publish for ${PKG} (already dist-shaped)" ;;
          esac

          mkdir -p "${GITHUB_WORKSPACE}/release-artifacts"
          (
            cd "packages/${PKG}"
            # Bun rewrites workspace/catalog protocols to concrete versions.
            bun pm pack --destination "${GITHUB_WORKSPACE}/release-artifacts"
          )
          sha256sum release-artifacts/*.tgz > "release-artifacts/SHA256SUMS-${PKG}"

      - name: Upload packed package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-${{ matrix.pkg }}
          path: release-artifacts/
          retention-days: 1
          if-no-files-found: error

  release:
    name: Release packages
    needs: pack
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publish) }}
    permissions:
      contents: write # Create immutable package tags and GitHub releases.
      id-token: write # npm trusted publishing; build scripts ran without this permission.
    # The repository owner publishes this versioned shared contract.
    uses: stella/.github/.github/workflows/npm-independent-release.yml@v1.0.0 # zizmor: ignore[unpinned-uses]
    with:
      artifact-pattern: npm-tarball-*
      package-files: |
        packages/docx-core/package.json
        packages/core/package.json
        packages/react/package.json
        packages/agents/package.json
        packages/vue/package.json
        packages/nuxt/package.json
