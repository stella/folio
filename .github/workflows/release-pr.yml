name: Release PR

# Maintains the "Version Packages" PR. On every push to main it runs
# changesets/action in version-only mode: the action collects the changesets
# merged since the last release and opens (or updates) a single PR that applies
# them — bumping the affected packages/{core,react}/package.json versions,
# updating changelogs, and re-syncing bun.lock via the custom version script.
#
# There is deliberately NO `publish` input here: this workflow never touches the
# registry. Merging the Version Packages PR lands the version bumps on main,
# which trips publish.yml's `paths` filter (packages/{core,react}/package.json —
# exactly what `changeset version` edits). publish.yml stays the sole publish
# mechanism (hardened two-job OIDC publish + GitHub Releases).

on:
  push:
    branches: [main]

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

# The default GITHUB_TOKEN cannot open PRs ("GitHub Actions is not permitted to
# create or approve pull requests"), so the branch push and PR are done with an
# app token (stella-provenance-updater, via the org CHANGELOG_APP_* secrets — the
# same app the org's npm-version-finalize workflow uses). The workflow token here
# stays read-only; all writes go through the app token.
permissions:
  contents: read

jobs:
  version:
    name: Maintain Version Packages PR
    runs-on: ubuntu-latest
    steps:
      - name: Mint stella-provenance-updater token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CHANGELOG_APP_ID }}
          private-key: ${{ secrets.CHANGELOG_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          # changesets/action authenticates its own branch push and PR creation
          # via the GITHUB_TOKEN env var passed to that step below; it does not
          # rely on git's persisted credential helper. Do not let checkout also
          # write the app token into .git/config, where the later `bun install`
          # step (untrusted lifecycle scripts) could read it.
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - run: bun install --frozen-lockfile

      - name: Create or update the Version Packages PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # `changeset version` bumps package.json + changelogs. A plain
          # `bun install` afterwards does NOT rewrite the "version" bun.lock
          # already has cached for an existing workspace entry, so the bumped
          # versions above previously went stale in the lockfile (see
          # scripts/check-lockfile-workspace-versions.ts). `changeset:version`
          # deletes bun.lock and regenerates it from scratch so the release PR
          # carries a lockfile whose workspace versions actually match.
          version: bun run changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
          # No `publish:` input: this action only maintains the version PR.
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
